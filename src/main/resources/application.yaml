ktor:
  deployment:
    port: ${PORT:-8080}
    host: "0.0.0.0"

  application:
    modules:
      - com.fintrack.ApplicationKt.module

database:
  url: ${DATABASE_URL:-jdbc:postgresql://localhost:5432/fintrack_db}
  driver: "org.postgresql.Driver"
  user: ${PGUSER:-fintrack}
  password: ${PGPASSWORD:-secret}
  poolSize: ${DB_POOL_SIZE:-5}
  connectionTimeout: 30000
  validationTimeout: 5000
  leakDetectionThreshold: 60000

jwt:
  secret: ${JWT_SECRET:-development-secret-change-in-production}
  issuer: "fintrack-app"
  audience: "fintrack-users"
  realm: "FinTrack API"

redis:
  host: ${REDISHOST:-localhost}
  port: ${REDISPORT:-6379}
  password: ${REDISPASSWORD:-}