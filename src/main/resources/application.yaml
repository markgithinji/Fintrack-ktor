ktor:
  deployment:
    port: ${PORT:-8080}
    host: "0.0.0.0"

  application:
    modules:
      - com.fintrack.ApplicationKt.module

database:
  url: ${DB_URL:-${DATABASE_URL:-jdbc:postgresql://localhost:5432/fintrack_db}}
  driver: "org.postgresql.Driver"
  user: ${DB_USER:-${PGUSER:-fintrack}}
  password: ${DB_PASSWORD:-${PGPASSWORD:-secret}}
  poolSize: ${DB_POOL_SIZE:-5}
  connectionTimeout: 30000
  validationTimeout: 5000
  leakDetectionThreshold: 60000

jwt:
  secret: ${JWT_SECRET:-development-secret-change-in-production}
  issuer: "fintrack-app"
  audience: "fintrack-users"
  realm: "FinTrack API"

redis:
  host: ${REDIS_HOST:-${REDISHOST:-localhost}}
  port: ${REDIS_PORT:-${REDISPORT:-6379}}
  password: ${REDIS_PASSWORD:-${REDISPASSWORD:-""}}